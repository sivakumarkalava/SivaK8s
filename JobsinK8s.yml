---creating job for every one minute to do the job and go the pod in completed state

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: demo-job
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: cont1
              image: nginx
              command: ["/bin/bash", "-c", "sudo apt update -y; sleep 20"]
          restartPolicy: Never
