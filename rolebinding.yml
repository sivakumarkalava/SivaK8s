---assugning the role to a user with help of below role binding manifest file
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mustafa-rb
  namespace: dev
subjects:
  - kind: User
    name: mustafa
    apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: mustafa-role
  apiGroup: rbac.authorization.k8s.io
