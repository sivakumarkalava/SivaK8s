tetris game
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mytetris
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tetris
  template:
    metadata:
      labels:
        app: tetris
    spec:
      containers:
        - name: cont1
          image: shaikmustafa/mytetrisgame:v2
          ports:
            - containerPort: 3000
