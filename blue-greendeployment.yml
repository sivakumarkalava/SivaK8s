---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bluedep
spec:
  replicas: 3
  selector:
    matchLabels:
      version: blue
  template:
    metadata:
      labels:
        version: blue
    spec:
      containers:
        - name: cont1
          image: shaikmustafa/dm
          ports:
            - containerPort: 80
======================================================================================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: greendep
spec:
  replicas: 3
  selector:
    matchLabels:
      version: green
  template:
    metadata:
      labels:
        version: green
    spec:
      containers:
        - name: cont2
          image: shaikmustafa/cycle
          ports:
            - containerPort: 80
===========================================================================================================
---
apiVersion: v1
kind: Service
metadata:
  name: bluegreensvc
spec:
  type: LoadBalancer
  selector:
    version: green
  ports:
    - port: 80
      targetPort: 80
