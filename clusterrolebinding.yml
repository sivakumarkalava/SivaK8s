---Assigning the all permissions that we set in cluster role and assigning those to a user/service level (Jenkins) to automate the 
ci/cd process without disruptions---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mustafaclusterrole
subjects:
  - kind: User
    name: mustafa
    apiGroup: rbac.authorization.k8s.io
roleRef:
     kind: ClusterRole
     name: mustafaclusterrole
     apiGroup: rbac.authorization.k8s.io
